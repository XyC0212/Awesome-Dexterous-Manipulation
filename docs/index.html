<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Awesome Dexterous Manipulation</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         margin: 0; padding: 1.5rem; max-width: 1100px; margin: 0 auto; line-height: 1.45; }
  h1 { margin: 0 0 .25rem; font-size: 1.6rem; }
  .sub { color: #777; margin: 0 0 1.25rem; }
  .controls { position: sticky; top: 0; background: Canvas; padding: .75rem 0;
               border-bottom: 1px solid #8884; z-index: 5; }
  #search { width: 100%; padding: .6rem .8rem; font-size: 1rem; box-sizing: border-box;
             border: 1px solid #8886; border-radius: 8px; background: Canvas; color: inherit; }
  .tagbar { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .6rem; align-items: center; }
  .tag { cursor: pointer; user-select: none; border: 1px solid #8886; border-radius: 999px;
          padding: .25rem .7rem; font-size: .85rem; }
  .tag.on { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .meta { margin-left: auto; color: #777; font-size: .85rem; }
  .mode { font-size: .8rem; color: #777; cursor: pointer; }
  table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
  th, td { text-align: left; padding: .5rem .6rem; border-bottom: 1px solid #8883; vertical-align: top; }
  th { font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; color: #777; }
  td.year, td.num { white-space: nowrap; color: #777; }
  .pill { display: inline-block; font-size: .72rem; padding: .05rem .45rem; margin: 0 .2rem .2rem 0;
           border-radius: 999px; background: #8882; }
  .links a { margin-right: .5rem; white-space: nowrap; }
  a.zotero { display: inline-flex; align-items: center; justify-content: center;
             width: 1.2rem; height: 1.2rem; border-radius: 4px; background: #cc2936;
             color: #fff !important; font-weight: 700; font-size: .8rem; line-height: 1;
             text-decoration: none; vertical-align: middle; margin-right: 0; }
  a.zotero:hover { background: #a81f2b; }
  tr.hide { display: none; }
  mark { background: #fde047; color: #000; }
</style>
</head>
<body>
  <h1>Awesome Dexterous Manipulation</h1>
  <p class="sub">A curated, filterable collection of dexterous robotic manipulation papers.
     Click the red <b>Z</b> to download a paper's citation for Zotero.</p>
  <div class="controls">
    <input id="search" type="search" placeholder="Search title, venue or affiliation…" autocomplete="off">
    <div class="tagbar" id="tagbar">
      <span class="mode" id="mode" title="Toggle AND/OR matching">match: <b>all</b></span>
      <span class="meta" id="count"></span>
    </div>
  </div>
  <table>
    <thead><tr><th>#</th><th>Title</th><th>Venue</th><th>Year</th><th>Affiliation</th><th>Tags</th><th>Links</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
<script>
const PAPERS = [{"n": 1, "title": "CHORD: Learning Dexterous Manipulation Using Contact Wrench Guidance from Human Demonstration", "venue": "arXiv", "year": "2026", "affiliation": "NVIDIA", "tags": ["RL", "IL", "HV"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2607.00033"}, {"label": "Project", "url": "https://nvidia-isaac.github.io/video_to_data/chord/"}], "ris": "TY  - JOUR\nTI  - Learning Dexterous Manipulation Using Contact Wrench Guidance From Human Demonstration\nAU  - Zhu, Xinghao\nAU  - Liu, Zixi\nAU  - Jain, Shalin\nAU  - Li, Chenran\nAU  - Noori, Milad\nAU  - Zhao, Huihua\nAU  - Welsh, John\nAU  - Lin, Michael Andres\nAU  - Liu, Wei\nAU  - Wang, Tingwu\nAU  - Da, Xingye\nAU  - Luo, Zhengyi\nAU  - Kulkarni, Vishal\nAU  - Bhatti, Naema\nAU  - Zhu, Yuke\nAU  - Fan, Linxi\nAU  - Wen, Bowen\nAU  - Xu, Danfei\nAU  - Pouya, Soha\nAU  - Chang, Yan\nPY  - 2026\nT2  - arXiv preprint arXiv:2607.00033\nAB  - Dexterous robot manipulation can benefit from the abundance of human demonstrations, but transferring such demonstrations to robot policies remains challenging. We present Contact Wrench Guidance from Human Demonstration in Robotic Dexterous Manipulation (CHORD), a framework for long-horizon manipulation of rigid and articulated objects with reinforcement learning. The key idea is object-centric contact wrench space guidance: we represent human and robot motions by the forces and torques they can induce on the object, enabling similarity to be measured by the induced instantaneous motions. This guidance makes reinforcement learning more scalable for contact-rich dexterous manipulation. We further introduce a large-scale simulation benchmark with 4,739 bimanual dexterous manipulation tasks, constructed from motion-capture datasets and reconstructed in-house videos. Evaluated on 1,831 benchmark tasks, CHORD achieves an average success rate of 82.12%, demonstrating strong scalability. CHORD also generalizes to whole-body manipulation from hand-only and third-person demonstrations, achieving a 90.77% success rate, and the learned policies transfer to the real world in both open-loop and closed-loop settings.\nUR  - https://arxiv.org/abs/2607.00033\nL1  - https://arxiv.org/pdf/2607.00033.pdf\nN1  - arXiv:2607.00033\nER  - ", "slug": "chord"}, {"n": 2, "title": "HumanEgo: Zero-Shot Robot Learning from Minutes of Human Egocentric Videos", "venue": "arXiv", "year": "2026", "affiliation": "University of Maryland", "tags": ["IL", "HV"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2605.24934"}, {"label": "Project", "url": "https://humanego-ai.github.io"}, {"label": "Code", "url": "https://github.com/TX-Leo/HumanEgo"}], "ris": "TY  - JOUR\nTI  - HumanEgo: Zero-Shot Robot Learning from Minutes of Human Egocentric Videos\nAU  - Wang, Zhi\nAU  - He, Botao\nAU  - Yu, Kelin\nAU  - Lee, Seungjae\nAU  - Gao, Ruohan\nAU  - Huang, Furong\nAU  - Aloimonos, Yiannis\nPY  - 2026\nT2  - arXiv preprint arXiv:2605.24934\nAB  - Human egocentric video captures rich manipulation demonstrations without any robot hardware, yet transferring these skills to robots remains challenging due to the embodiment gap between human and robot in both visual appearance and kinematics. We present HumanEgo, a framework that bridges the embodiment gap by lifting each human demonstration to an entity-level representation of hand-object interaction, and training a flow matching policy with dense auxiliary objectives that amplify supervision from every trajectory. HumanEgo is robot-data-free, hardware-agnostic, data-efficient, and zero-shot human-to-robot transferable. With only 30 minutes of human videos per task, HumanEgo achieves 92.5% average success across four real-world tasks (75% with just 15 minutes), outperforms matched-time robot teleoperation by 41%, and robustly transfers zero-shot across novel robots, cameras, and environments. We release HumanEgo as an easy-to-use, open-source framework for learning robot policies directly from human data: https://github.com/TX-Leo/HumanEgo\nUR  - https://arxiv.org/abs/2605.24934\nL1  - https://arxiv.org/pdf/2605.24934.pdf\nN1  - arXiv:2605.24934\nER  - ", "slug": "humanego"}, {"n": 3, "title": "Do as I Do: Dexterous Manipulation Data from Everyday Human Videos", "venue": "arXiv", "year": "2026", "affiliation": "UC Berkeley", "tags": ["IL", "HV", "HW"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2606.19333"}, {"label": "Project", "url": "https://do-as-i-do.com/"}], "ris": "TY  - JOUR\nTI  - Do as I Do: Dexterous Manipulation Data from Everyday Human Videos\nAU  - Paliwal, Bhawna\nAU  - Etukuru, Haritheja\nAU  - Liang, William\nAU  - Abbeel, Pieter\nAU  - Shafiullah, Nur Muhammad Mahi\nAU  - Malik, Jitendra\nPY  - 2026\nT2  - arXiv preprint arXiv:2606.19333\nAB  - How can we scalably generate data for robotic manipulation, especially on human-like platforms such as dexterous multi-fingered hands? Learning from human videos has recently emerged as a likely answer to this question. However, difficulties in estimating hand-object interaction and crossing the human-to-robot embodiment gap have hindered the adoption of abundant monocular RGB-only human videos as the primary source of robot manipulation data. In this work, we present DO AS I DO, an algorithm to reconstruct and retarget monocular RGB human videos to multi-fingered dexterous robotic hands. DO AS I DO reconstructs hand-object interactions from various egocentric and exocentric in-the-wild video sources. The algorithm then retargets these hand-object interaction estimates into a sequence of actions executable in the real world, yielding robot-complete manipulation data from disparate human videos. Overall, DO AS I DO outperforms previous state of the art in estimating hand-object interactions and extracting dexterous manipulation trajectories from RGB videos, as we show in experiments on datasets with ground truths and on a dataset of video clips collected online. Our experiments enable us to propose an efficacy playbook for practitioners collecting human data for manipulation.\nUR  - https://arxiv.org/abs/2606.19333\nL1  - https://arxiv.org/pdf/2606.19333.pdf\nN1  - arXiv:2606.19333\nER  - ", "slug": "do-as-i-do"}, {"n": 4, "title": "T-Rex: Tactile-Reactive Dexterous Manipulation", "venue": "arXiv", "year": "2026", "affiliation": "UC Berkeley, NVIDIA", "tags": ["IL", "HV", "Tac", "HW"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2606.17055"}], "ris": "TY  - JOUR\nTI  - T-Rex: Tactile-Reactive Dexterous Manipulation\nAU  - Niu, Dantong\nAU  - Liu, Zhuoyang\nAU  - Wang, Zekai\nAU  - Shao, Boning\nAU  - Yin, Zhao-Heng\nAU  - Pai, Anirudh\nAU  - Sharma, Yuvan\nAU  - Saravalle, Stefano\nAU  - Zheng, Ruijie\nAU  - Wang, Jing\nAU  - Punamiya, Ryan\nAU  - Xu, Mengda\nAU  - Xie, Yuqi\nAU  - Jiang, Yunfan\nAU  - Fu, Letian\nAU  - Kallidromitis, Konstantinos\nAU  - Gioia, Matteo\nAU  - Zhang, Junyi\nAU  - Ge, Jiaxin\nAU  - Feng, Haiwen\nAU  - Galasso, Fabio\nAU  - Zhan, Wei\nAU  - Chan, David M.\nAU  - Bai, Yutong\nAU  - Herzig, Roei\nAU  - Lei, Jiahui\nAU  - Fei-Fei, Li\nAU  - Goldberg, Ken\nAU  - Malik, Jitendra\nAU  - Abbeel, Pieter\nAU  - Zhu, Yuke\nAU  - Xu, Danfei\nAU  - Fan, Linxi\nAU  - Darrell, Trevor\nPY  - 2026\nT2  - arXiv preprint arXiv:2606.17055\nAB  - The ability to react dynamically to tactile signals has long been considered crucial to agile human-level dexterity. Yet contemporary learning-based Vision-Language-Action (VLA) models for robotic manipulation generally either overlook the tactile modality or are limited to encoders with static cues, due in part to the scarcity of diverse training data and standardized evaluation, architectural constraints in current VLA models, and limitations of static tactile encoders. In this paper, we push the frontier of tactile-reactive manipulation by addressing all of these limitations. We propose a large-scale, 100-hour tactile-rich dataset collected via a novel, data-efficient recipe that prioritizes elementary motor primitives. To effectively exploit naturally high-frequency touch signals without sacrificing the existing capabilities of existing VLAs, we introduce a variable-rate Mixture-of-Transformers (MoT) architecture equipped with a novel temporal tactile VQ-VAE encoder. We demonstrate the effectiveness of tactile-reactive policies on 12 manipulation tasks requiring delicate force control and deformable object manipulation, achieving over 30% higher average success rate than the strongest baseline.\nUR  - https://arxiv.org/abs/2606.17055\nL1  - https://arxiv.org/pdf/2606.17055.pdf\nN1  - arXiv:2606.17055\nER  - ", "slug": "t-rex"}, {"n": 5, "title": "EgoEngine: From Egocentric Human Videos to High-Fidelity Dexterous Robot Demonstrations", "venue": "arXiv", "year": "2026", "affiliation": "Georgia Tech", "tags": ["IL", "HV"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2606.12604"}, {"label": "Project", "url": "https://egoengine.github.io/"}], "ris": "TY  - JOUR\nTI  - EgoEngine: From Egocentric Human Videos to High-Fidelity Dexterous Robot Demonstrations\nAU  - Liu, Yangcen\nAU  - Cheng, Shuo\nAU  - Yin, Xinchen\nAU  - Shin, Woo Chul\nAU  - Cueva, Alfred\nAU  - Yang, Yiran\nAU  - Chen, Zhenyang\nAU  - Zhang, Chuye\nAU  - Xu, Danfei\nPY  - 2026\nT2  - arXiv preprint arXiv:2606.12604\nAB  - Dexterous manipulation is limited by the cost of collecting large-scale robot demonstrations. Egocentric human videos offer a scalable source of diverse manipulation behaviors, but directly using them for robot learning requires bridging two gaps: the visual gap between human and robot observations, and the action gap between human motion and robot-executable action. We propose EgoEngine, a scalable framework for transforming egocentric human manipulation videos into high-fidelity robot data. Given an egocentric RGB video, EgoEngine produces: (i) a high-fidelity robot observation video replacing human with robot while preserving scene context and temporal alignment, and (ii) a task-aligned, executable robot action trajectory under feasibility constraints. Experiments in simulation and on real robots show that EgoEngine enables scalable conversion of human videos into robot data and, to our knowledge, demonstrates the first zero-shot visuomotor dexterous policy learning from egocentric human videos without real-robot demonstrations. Project website: https://egoengine.github.io.\nUR  - https://arxiv.org/abs/2606.12604\nL1  - https://arxiv.org/pdf/2606.12604.pdf\nN1  - arXiv:2606.12604\nER  - ", "slug": "egoengine"}, {"n": 6, "title": "Video2Sim2Real: Full-Stack Autonomous Dexterous Skill Acquisition from a Single Human Video", "venue": "arXiv", "year": "2026", "affiliation": "Georgia Tech", "tags": ["RL", "IL", "HV", "HW"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2606.08828"}, {"label": "Project", "url": "https://video2sim2real.github.io/"}], "ris": "TY  - JOUR\nTI  - Video2Sim2Real: Full-Stack Autonomous Dexterous Skill Acquisition from a Single Human Video\nAU  - Han, Yunhai\nAU  - Qiu, Jianuo\nAU  - Bai, Linhao\nAU  - Xiao, Ziyu\nAU  - Zeng, Zihang\nAU  - Liu, Yangcen\nAU  - Yang, Zhaodong\nAU  - Jain, Shalin\nAU  - Ma, Wenrui\nAU  - Fu, Jiaqi\nAU  - Zheng, Yuqian\nAU  - Natarajan, Manisha\nAU  - Irshad, Muhammad Zubair\nAU  - Shaw, Kenneth\nAU  - Gombolay, Matthew\nAU  - Kira, Zsolt\nAU  - Ravichandar, Harish\nPY  - 2026\nT2  - arXiv preprint arXiv:2606.08828\nAB  - Human manipulation videos are a convenient and intuitive source for robot learning. However, directly transferring human dexterity to robots remains challenging due to perception errors and embodiment gap. To address this, we introduce Video2Sim2Real, a full-stack framework for autonomous skill acquisition from a single human manipulation video. Our framework first uses off-the-shelf foundation models to reconstruct a simulator-ready digital twin and extract robot and object motion priors. Rather than treating the extracted robot motion as a reliable reference throughout execution, our key idea is to recover and leverage the most fundamental sources of supervision from the demonstrated skill: We identify object-centric keyframes to optimize the corresponding robot configurations using object information from the simulator, and use these configurations as anchors that refine the robot motion such that it ultimately has the desired impact on the environment. To bridge the remaining sim-to-real gap, we introduce a sim-to-real strategy that decouples robustness to noisy and incomplete perception from variations in hand-object interaction dynamics. Specifically, we learn to recalibrate robot configurations from noisy real-world point clouds via IL, and leverage residual RL to perform local finger-level adaptations to ensure for robust and effective interactions. Finally, a collision-aware motion planning module enables spatial generalization to novel object configurations. Across several everyday manipulation tasks, Video2Sim2Real improves simulated task success, safety, and trajectory coherence over numerous baselines, and achieves better sim-to-real transfer than existing techniques. These results demonstrate a promising path toward autonomous dexterous skill acquisition from human videos.\nUR  - https://arxiv.org/abs/2606.08828\nL1  - https://arxiv.org/pdf/2606.08828.pdf\nN1  - arXiv:2606.08828\nER  - ", "slug": "video2sim2real"}, {"n": 7, "title": "SimToolReal: An Object-Centric Policy for Zero-Shot Dexterous Tool Manipulation", "venue": "arXiv", "year": "2026", "affiliation": "Cornell University", "tags": ["RL", "HV", "HW"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2602.16863"}, {"label": "Project", "url": "https://simtoolreal.github.io/"}], "ris": "TY  - JOUR\nTI  - SimToolReal: An Object-Centric Policy for Zero-Shot Dexterous Tool Manipulation\nAU  - Kedia, Kushal\nAU  - Lum, Tyler Ga Wei\nAU  - Bohg, Jeannette\nAU  - Liu, C. Karen\nPY  - 2026\nT2  - arXiv preprint arXiv:2602.16863\nAB  - The ability to manipulate tools significantly expands the set of tasks a robot can perform. Yet, tool manipulation represents a challenging class of dexterity, requiring grasping thin objects, in-hand object rotations, and forceful interactions. Since collecting teleoperation data for these behaviors is challenging, sim-to-real reinforcement learning (RL) is a promising alternative. However, prior approaches typically require substantial engineering effort to model objects and tune reward functions for each task. In this work, we propose SimToolReal, taking a step towards generalizing sim-to-real RL policies for tool manipulation. Instead of focusing on a single object and task, we procedurally generate a large variety of tool-like object primitives in simulation and train a single RL policy with the universal goal of manipulating each object to random goal poses. This approach enables SimToolReal to perform general dexterous tool manipulation at test-time without any object or task-specific training. We demonstrate that SimToolReal outperforms prior retargeting and fixed-grasp methods by 37% while matching the performance of specialist RL policies trained on specific target objects and tasks. Finally, we show that SimToolReal generalizes across a diverse set of everyday tools, achieving strong zero-shot performance over 120 real-world rollouts spanning 24 tasks, 12 object instances, and 6 tool categories.\nUR  - https://arxiv.org/abs/2602.16863\nL1  - https://arxiv.org/pdf/2602.16863.pdf\nN1  - arXiv:2602.16863\nER  - ", "slug": "simtoolreal"}];
const TAGS = ["RL", "IL", "WM", "HV", "Tac", "HW", "Tele"];
let active = new Set();
let andMode = true;

const tagbar = document.getElementById('tagbar');
const mode = document.getElementById('mode');
TAGS.forEach(t => {
  const el = document.createElement('span');
  el.className = 'tag'; el.textContent = t; el.dataset.tag = t;
  el.onclick = () => { active.has(t) ? active.delete(t) : active.add(t); el.classList.toggle('on'); render(); };
  tagbar.insertBefore(el, mode);
});
mode.onclick = () => { andMode = !andMode; mode.querySelector('b').textContent = andMode ? 'all' : 'any'; render(); };

const rows = document.getElementById('rows');
const search = document.getElementById('search');
const count = document.getElementById('count');

function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hl(text, q) {
  if (!q) return esc(text);
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i,i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}

function build() {
  rows.innerHTML = PAPERS.map(p => {
    const pills = p.tags.map(t => '<span class="pill">'+t+'</span>').join('');
    const links = p.links.map(l => '<a href="'+l.url+'" target="_blank" rel="noopener">'+esc(l.label)+'</a>').join(' · ');
    const ris = 'data:application/x-research-info-systems;charset=utf-8,' + encodeURIComponent(p.ris);
    const zot = '<a class="zotero" href="'+ris+'" download="'+esc(p.slug)+'.ris" title="Add to Zotero (download .ris)">Z</a>';
    return '<tr data-title="'+esc(p.title.toLowerCase())+'" data-venue="'+esc(p.venue.toLowerCase())+'" data-affil="'+esc((p.affiliation||'').toLowerCase())+'" data-tags="'+p.tags.join(',')+'">'
      + '<td class="num">'+p.n+'</td>'
      + '<td class="title">'+esc(p.title)+'</td>'
      + '<td>'+esc(p.venue)+'</td>'
      + '<td class="year">'+esc(p.year)+'</td>'
      + '<td>'+esc(p.affiliation||'')+'</td>'
      + '<td>'+pills+'</td>'
      + '<td class="links">'+links+' '+zot+'</td></tr>';
  }).join('');
}

function render() {
  const q = search.value.trim().toLowerCase();
  let shown = 0;
  for (const tr of rows.children) {
    const tags = tr.dataset.tags ? tr.dataset.tags.split(',') : [];
    const tagOk = active.size === 0 || (andMode
      ? [...active].every(t => tags.includes(t))
      : [...active].some(t => tags.includes(t)));
    const textOk = !q || tr.dataset.title.includes(q) || tr.dataset.venue.includes(q) || tr.dataset.affil.includes(q);
    const ok = tagOk && textOk;
    tr.classList.toggle('hide', !ok);
    if (ok) { shown++;
      tr.querySelector('.title').innerHTML = hl(tr.querySelector('.title').textContent, q);
    }
  }
  count.textContent = shown + ' / ' + PAPERS.length + ' papers';
}

build();
search.addEventListener('input', render);
render();
</script>
</body>
</html>
