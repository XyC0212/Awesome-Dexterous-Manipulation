, {"label": "Code", "url": "https://github.com/yzqin/dexpoint-release"}]}, {"n": 47, "title": "VideoDex: Learning Dexterity from Internet Videos", "venue": "CoRL", "year": "2022", "tags": ["RL", "IL"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2212.04498"}, {"label": "Project", "url": "https://video-dex.github.io/"}]}, {"n": 48, "title": "DexMV: Imitation Learning for Dexterous Manipulation from Human Videos", "venue": "ECCV", "year": "2022", "tags": ["RL", "IL"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2108.05877"}, {"label": "Project", "url": "https://yzqin.github.io/dexmv/"}, {"label": "Code", "url": "https://github.com/yzqin/dexmv-sim"}]}, {"n": 49, "title": "DexVIP: Learning Dexterous Grasping with Human Hand Pose Priors from Video", "venue": "CoRL", "year": "2022", "tags": ["RL", "IL"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2202.00164"}]}, {"n": 50, "title": "From One Hand to Multiple Hands: Imitation Learning from Single-Camera Teleoperation", "venue": "RA-L", "year": "2022", "tags": ["IL", "Tele"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2204.12490"}, {"label": "Project", "url": "https://yzqin.github.io/dex-teleop-imitation/"}]}, {"n": 51, "title": "Robotic Telekinesis: Learning a Robotic Hand Imitator by Watching Humans on YouTube", "venue": "RSS", "year": "2022", "tags": ["IL", "Tele"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2202.10448"}, {"label": "Project", "url": "https://robotic-telekinesis.github.io/"}]}, {"n": 52, "title": "A System for General In-Hand Object Re-Orientation", "venue": "CoRL", "year": "2021", "tags": ["RL"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/2111.03043"}, {"label": "Project", "url": "https://taochenshh.github.io/projects/in-hand-reorientation"}]}, {"n": 53, "title": "Learning Dexterous In-Hand Manipulation", "venue": "IJRR", "year": "2020", "tags": ["RL"], "links": [{"label": "Paper", "url": "https://arxiv.org/abs/1 const TAGS = ["RL", "IL", "WM", "Tac", "HW", "Tele"];
let active = new Set();
let andMode = true;

const tagbar = document.getElementById('tagbar');
const mode = document.getElementById('mode');
TAGS.forEach(t => {
  const el = document.createElement('span');
  el.className = 'tag'; el.textContent = t; el.dataset.tag = t;
  el.onclick = () => { active.has(t) ? active.delete(t) : active.add(t); el.classList.toggle('on'); render(); };
  tagbar.insertBefore(el, mode);
});
mode.onclick = () => { andMode = !andMode; mode.querySelector('b').textContent = andMode ? 'all' : 'any'; render(); };

const rows = document.getElementById('rows');
const search = document.getElementById('search');
const count = document.getElementById('count');

function esc(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function hl(text, q) {
  if (!q) return esc(text);
  const i = text.toLowerCase().indexOf(q);
  if (i < 0) return esc(text);
  return esc(text.slice(0,i)) + '<mark>' + esc(text.slice(i,i+q.length)) + '</mark>' + esc(text.slice(i+q.length));
}

function build() {
  rows.innerHTML = PAPERS.map(p => {
    const pills = p.tags.map(t => '<span class="pill">'+t+'</span>').join('');
    const links = p.links.map(l => '<a href="'+l.url+'" target="_blank" rel="noopener">'+esc(l.label)+'</a>').join(' · ');
    return '<tr data-title="'+esc(p.title.toLowerCase())+'" data-venue="'+esc(p.venue.toLowerCase())+'" data-tags="'+p.tags.join(',')+'">'
      + '<td class="num">'+p.n+'</td>'
      + '<td class="title">'+esc(p.title)+'</td>'
      + '<td>'+esc(p.venue)+'</td>'
      + '<td class="year">'+esc(p.year)+'</td>'
      + '<td>'+pills+'</td>'
      + '<td class="links">'+links+'</td></tr>';
  }).join('');
}

function render() {
  const q = search.value.trim().toLowerCase();
  let shown = 0;
  for (const tr of rows.children) {
    const tags = tr.dataset.tags ? tr.dataset.tags.split(',') : [];
    const tagOk = active.size === 0 || (andMode
      ? [...active].every(t => tags.includes(t))
      : [...active].some(t => tags.includes(t)));
    const textOk = !q || tr.dataset.title.includes(q) || tr.dataset.venue.includes(q);
    const ok = tagOk && textOk;
    tr.classList.toggle('hide', !ok);
    if (ok) { shown++;
      tr.querySelector('.title').innerHTML = hl(tr.querySelector('.title').textContent, q);
    }
  }
  count.textContent = shown + ' / ' + PAPERS.length + ' papers';
}

build();
search.addEventListener('input', render);
render();
</script>
</body>
</html>
